<!DOCTYPE html>
<html>
<head>
    <title>Game Save XOR Editor</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; background: #f0f2f5; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; }
        .controls { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        td { cursor: edit; }
        td:focus { background: #fff9c4; outline: 2px solid #007bff; }
        .btn { cursor: pointer; padding: 10px 20px; border-radius: 4px; border: none; font-weight: bold; }
        .primary { background: #007bff; color: white; }
        .success { background: #28a745; color: white; }
        .copy-btn { background: #6c757d; color: white; }
    </style>
</head>
<body>

    <h2>🎮 Game Save XOR Editor</h2>
    
    <label><strong>1. Input XORed String:</strong></label>
    <textarea id="userInput" placeholder='Paste your XORed save string here...'></textarea>

    <div class="controls">
        <button class="btn primary" onclick="loadAndDecrypt()">🔓 Decrypt & Load to Table</button>
        <button class="btn success" onclick="saveAndEncrypt()">🔒 Apply Changes & XOR</button>
        <button class="btn copy-btn" onclick="copyResult()">📋 Copy Output</button>
    </div>

    <div id="tableContainer">
        <!-- Table will be generated here -->
    </div>

    <script>
        const XOR_KEY = 6;

        function xor_logic(input) {
            let res = "";
            for(let i = 0; i < input.length; i++) {
                res += String.fromCharCode(XOR_KEY ^ input.charCodeAt(i));
            }
            return res;
        }

        function loadAndDecrypt() {
            const raw = document.getElementById("userInput").value;
            const decrypted = xor_logic(raw);
            
            try {
                const data = JSON.parse(decrypted);
                buildTable(data);
            } catch (e) {
                alert("Error: Decrypted text is not valid JSON. Check your input!");
            }
        }

        function buildTable(obj) {
            let html = `<table><thead><tr><th>Key</th><th>Value (Click to Edit)</th></tr></thead><tbody>`;
            for (let key in obj) {
                html += `<tr>
                    <td><strong>${key}</strong></td>
                    <td contenteditable="true" data-key="${key}">${obj[key]}</td>
                </tr>`;
            }
            html += `</tbody></table>`;
            document.getElementById("tableContainer").innerHTML = html;
        }

        function saveAndEncrypt() {
            const cells = document.querySelectorAll("[data-key]");
            let updatedData = {};
            
            cells.forEach(cell => {
                let val = cell.innerText;
                // Attempt to preserve numbers/booleans if they look like them
                if (!isNaN(val) && val.trim() !== "") val = Number(val);
                if (val === "true") val = true;
                if (val === "false") val = false;
                
                updatedData[cell.getAttribute("data-key")] = val;
            });

            const jsonStr = JSON.stringify(updatedData);
            const encrypted = xor_logic(jsonStr);
            
            document.getElementById("userInput").value = encrypted;
            alert("Changes saved back to text box above!");
        }

        async function copyResult() {
            const text = document.getElementById("userInput").value;
            await navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>

</body>
</html>
