<script>
"use strict";

// ===== CONFIG =====
const XOR_KEY = 6;
const STORAGE_KEY = "xor_editor_data";

// ===== UTF-8 SAFE XOR =====
function xorString(str, key = XOR_KEY) {
    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    const bytes = encoder.encode(str);
    const result = bytes.map(b => b ^ key);

    return decoder.decode(new Uint8Array(result));
}

// ===== BASE64 SAFE WRAPPERS =====
function encrypt(str) {
    const xored = xorString(str);
    return btoa(unescape(encodeURIComponent(xored)));
}

function decrypt(base64Str) {
    try {
        const decoded = decodeURIComponent(escape(atob(base64Str)));
        return xorString(decoded);
    } catch (e) {
        alert("Invalid encrypted string.");
        return "";
    }
}

// ===== TABLE RENDERING =====
function renderTable(values) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    values.forEach(value => {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.contentEditable = "true";
        td.textContent = value.trim();
        tr.appendChild(td);
        tbody.appendChild(tr);
    });

    document.getElementById("dataTable").style.display = "table";
    document.getElementById("encryptBtn").style.display = "block";
}

// ===== DECRYPT HANDLER =====
function handleDecrypt() {
    const input = document.getElementById("inputString").value.trim();
    if (!input) return alert("Please enter a string.");

    const decrypted = decrypt(input);
    if (!decrypted) return;

    const values = decrypted.split(",");
    renderTable(values);
}

// ===== ENCRYPT HANDLER =====
function handleEncrypt() {
    const rows = document.querySelectorAll("#tableBody td");
    const values = Array.from(rows).map(td => td.innerText.trim());

    const plainString = values.join(",");
    const encrypted = encrypt(plainString);

    document.getElementById("outputArea").style.display = "block";
    document.getElementById("resultString").innerText = encrypted;

    // Save automatically
    localStorage.setItem(STORAGE_KEY, encrypted);
}

// ===== LOAD FROM LOCALSTORAGE =====
function loadSaved() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;

    document.getElementById("inputString").value = saved;
    const decrypted = decrypt(saved);
    if (!decrypted) return;

    renderTable(decrypted.split(","));
}

// Auto-load on page start
window.onload = loadSaved;
</script>
